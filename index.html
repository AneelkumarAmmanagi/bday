<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday 🎉</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #7ad7ff);
            overflow: hidden;
            color: white;
        }

        h1 {
            margin-top: 120px;
            font-size: 60px;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: 26px;
            margin: 10px;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white;
            }
            to {
                text-shadow: 0 0 30px yellow, 0 0 40px pink;
            }
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            bottom: -10px;
            font-size: 24px;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-800px);
                opacity: 0;
            }
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #ff4d6d;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4d6d;
            color: white;
        }
    </style>
</head>

<body>

<h1>Happy Birthday 🎂</h1>

<p>You make my world brighter every day 💖</p>
<p>Keep smiling always 😊</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<script>
    function showMessage() {
        alert("You are truly special 💕 Never forget that!");
    }

    // Create floating hearts
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
</script>

</body>
</html>
